# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 阑梦读书会
subtitle: '文学解读与书籍鉴赏'
description: |-
  在信息奔涌的时代，慢下来读一点书。
  这里记录阅读的痕迹，也记录人与历史的相遇。
  不追求结论，只留下思考与温度。
keywords: 文学,读书,书籍解读,书评,阅读
author: 阑梦清川
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://zzylanmengqingchuan.github.io/reading_space
root: /reading_space/
permalink: :year/:month/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
  中国文学: chinese-literature
  外国文学: foreign-literature
  诗歌鉴赏: poetry
  散文随笔: essay
  经典重读: classics
  读书笔记: reading-notes
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY年M月D日
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: butterfly

# RSS Feed
feed:
  enable: true
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content:
  content_limit: 140
  content_limit_delim: ' '
  order_by: -date
  icon: icon.png
  autodiscovery: true
  template:

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
## 把 your-username 改成你的 GitHub 用户名
deploy:
  type: git
  repo: https://github.com/your-username/your-username.github.io.git
  branch: main
